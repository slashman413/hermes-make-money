name: Make Money Pipeline

on:
  schedule:
    - cron: "0 6 * * *"  # Daily 06:00 UTC = 14:00 Taipei - update income dashboard
  workflow_dispatch:
    inputs:
      amount:
        description: "Income amount to record"
        required: false
      source:
        description: "Income source"
        required: false
      notes:
        description: "Notes"
        required: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  income-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Record income (if triggered with data)
        if: github.event_name == 'workflow_dispatch' && inputs.amount != ''
        run: |
          NOTES="${{ inputs.notes }}"
          python scripts/income.py add \
            --amount ${{ inputs.amount }} \
            --source "${{ inputs.source }}" \
            --notes "${NOTES:-收入記錄}"

      - name: Generate income dashboard
        run: |
          python scripts/income.py dashboard
          python scripts/income.py report
          python scripts/income.py verify

      - name: Output to job summary
        run: |
          echo "## 💰 收入儀表板" >> $GITHUB_STEP_SUMMARY
          cat INCOME.md >> $GITHUB_STEP_SUMMARY

      - name: Commit updated dashboard
        run: |
          git config user.name "hermes-agent"
          git config user.email "hermes@nousresearch.com"
          git add data/ INCOME.md skills/ results/
          git diff --staged --quiet || git commit -m "auto: update income dashboard $(date +%Y-%m-%d)"
          git push
